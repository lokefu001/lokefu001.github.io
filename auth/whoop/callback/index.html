<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>WHOOP OAuth Callback</title>
</head>
<body>
  <h1>WHOOP OAuth Callback</h1>
  <p>Copy the full URL from your browser address bar and paste it back into your app.</p>

  <p><strong>Authorization code:</strong></p>
  <pre id="code"></pre>

  <p><strong>Full redirect URL:</strong></p>
  <pre id="url"></pre>

  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById("code").textContent =
      params.get("code") || "No code found in URL";
    document.getElementById("url").textContent = window.location.href;
  </script>
</body>
</html>
